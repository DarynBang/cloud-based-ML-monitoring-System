# Cấu hình đường dẫn dữ liệu
paths:
  raw_dir: "dataset/raw"
  processed_dir: "dataset/processed"
  processed_file: "dataset/processed/cleaned_stocks.parquet"
  feature_file: "dataset/processed/features_stocks.parquet"

# Cấu hình logging
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# Tham số mặc định cho Feature Engineering (Giai đoạn 2)
features:
  sma_short: 20
  sma_long: 50
  rsi_period: 14
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9

# Tham số cho chiến lược (Giai đoạn 3)
strategies:
  dca_interval: 20  # Số phiên giao dịch giữa mỗi lần mua DCA

# Cấu hình Quản trị rủi ro (Giai đoạn 4)
risk:
  initial_balance: 1000
  stop_loss_pct: 0.05
  trailing_stop_pct: 0.05    # Cắt lỗ động 5% từ đỉnh
  max_capital_per_trade: 0.10
  risk_per_trade_pct: 0.01
  var_confidence_level: 0.95 # Độ tin cậy 95%

# Cấu hình Backtest
backtest:
  sample_size: 50
  random_seed: 42  # Đảm bảo chọn mẫu ổn định để có thể dùng cache


# Trading costs (fee + slippage) used by backtest engine
trading_costs:
  fee_pct: 0.001       # 0.10% per execution
  slippage_bps: 5      # 5 bps = 0.05% price impact per execution


# Machine Learning (Giai doan 5)
ml:
  enabled: true
  artifact_dir: ""           # e.g. models/hist_gbdt_20260227_210000
  model_output_dir: "models"
  label_horizon_days: 5
  label_up_threshold: 0.01
  label_down_threshold: -0.01
  feature_shift_bars: 1
  feature_cols:
    - "sma_20"
    - "sma_50"
    - "rsi_14"
    - "macd"
    - "macd_signal"
    - "macd_hist"
  train:
    symbols_sample_size: 200
    date_start: ""
    date_end: ""
    train_end: ""
    val_end: ""
    random_seed: 42
  model:
    type: "hist_gbdt"        # hist_gbdt | logreg
    output_dir: "models"
  policy:
    p_buy: 0.55
    p_sell: 0.55
    min_conf_gap: 0.05
    trend_col: "sma_50"

# Continual Learning & Walk-Forward Simulation (Phase 6)
continual_learning:
  enabled: true
  train_window_months: 12     # Dung 1 nam du lieu de train
  test_window_months: 3       # Test tren 3 thang tiep theo
  step_months: 3              # Nhay cua so moi 3 thang (Retrain frequency)
  symbols_sample_size: 50     # Gioi han symbols de tang toc mo phong
  output_dir: "models/walk_forward"
